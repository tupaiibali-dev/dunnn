<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center; 
            
            /* Подключаем твою фотку image */
            background-image: url('image'); 
            
            background-position: center; 
            background-repeat: no-repeat; 
            background-size: cover; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; 
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4); 
            z-index: 1;
        }

        .btn {
            position: relative; 
            z-index: 2;
            display: inline-block;
            background: linear-gradient(135deg, #24A1DE 0%, #1a8cc3 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 20px 45px; 
            border-radius: 60px;
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 1px;
            text-transform: uppercase; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease; 
            border: 2px solid rgba(255, 255, 255, 0.2); 
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02); 
            box-shadow: 0 15px 40px rgba(36, 161, 222, 0.5); 
        }

        .btn:active {
            transform: translateY(1px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <a href="https://t.me/+T-jsvpXSlSNkNmUy" class="btn">Open Telegram</a>

</body>
</html>
